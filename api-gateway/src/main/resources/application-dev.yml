# Configura o ambiente local de desenvolvimento.
management:
  # Expõe endpoints operacionais para diagnóstico local.
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
  endpoint:
    gateway:
      access: unrestricted

# Configura as origens locais permitidas pelo CORS.
ecofy:
  gateway:
    cors:
      allowed-origins:
        - http://localhost:3000
        - http://localhost:5173

# Habilita logs detalhados do Gateway durante o desenvolvimento.
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping: DEBUG
