# Configura o ambiente de produção.
management:
  # Expõe somente os endpoints necessários para saúde e métricas.
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    # Bloqueia o acesso ao endpoint operacional do Gateway.
    gateway:
      access: none
    # Habilita as sondagens de disponibilidade da aplicação.
    health:
      probes:
        enabled: true

# Configura a origem permitida pelo CORS em produção.
ecofy:
  gateway:
    cors:
      allowed-origins:
        - ${ECOFY_CORS_ALLOWED_ORIGIN:https://app.ecofy.example}
      allow-credentials: false

# Reduz o nível dos logs do Gateway em produção.
logging:
  level:
    org.springframework.cloud.gateway: WARN