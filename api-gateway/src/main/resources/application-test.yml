# Configura o ambiente de testes automatizados.
management:
  # Expõe os endpoints necessários para validações de integração.
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway

# Configura uma política CORS determinística para os testes.
ecofy:
  gateway:
    cors:
      allowed-origins:
        - https://app.allowed.test
      allowed-methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      allowed-headers: [Authorization, Content-Type, X-Correlation-Id]
      exposed-headers: [X-Correlation-Id]
      allow-credentials: false
      max-age: 3600

# Define o nível dos logs do Gateway durante os testes.
logging:
  level:
    org.springframework.cloud.gateway: INFO