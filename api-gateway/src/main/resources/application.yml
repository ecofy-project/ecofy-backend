server:
  port: 8080

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:
          enabled: true

          # Habilita as métricas nativas do Gateway.
          metrics:
            enabled: true

          # Configura os timeouts globais das conexões downstream.
          httpclient:
            connect-timeout: 2000
            response-timeout: 5s

          # Aplica os filtros padrão a todas as rotas.
          default-filters:
            - RemoveRequestHeader=Cookie
            - AddRequestHeader=X-Gateway, api-gateway
            - DedupeResponseHeader=X-Correlation-Id, RETAIN_FIRST

          routes:
            # Configura a rota versionada do serviço de autenticação.
            - id: v1-auth
              uri: ${MS_AUTH_URI:http://localhost:8081}
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - RewritePath=/api/v1/auth(?<segment>.*), /auth/api/v1/auth$\{segment}
                - name: CircuitBreaker
                  args:
                    name: cb-auth
                    fallbackUri: forward:/__gateway/fallback
                - name: Retry
                  args:
                    retries: 2
                    methods: GET
                    series: SERVER_ERROR
                    exceptions:
                      - java.io.IOException
                    backoff:
                      firstBackoff: 50ms
                      maxBackoff: 500ms
                      factor: 2
                      basedOnPreviousValue: false
              metadata:
                response-timeout: 4000
                connect-timeout: 2000

            # Configura a rota versionada do serviço de usuários.
            - id: v1-users
              uri: ${MS_USERS_URI:http://localhost:8087}
              predicates:
                - Path=/api/v1/users/**
              filters:
                - RewritePath=/api/v1/users(?<segment>.*), /users/api/users/v1$\{segment}
                - name: CircuitBreaker
                  args:
                    name: cb-users
                    fallbackUri: forward:/__gateway/fallback
                - name: Retry
                  args:
                    retries: 2
                    methods: GET
                    series: SERVER_ERROR
                    exceptions:
                      - java.io.IOException
                    backoff:
                      firstBackoff: 50ms
                      maxBackoff: 500ms
                      factor: 2
                      basedOnPreviousValue: false
              metadata:
                response-timeout: 4000
                connect-timeout: 2000

            # Configura a rota versionada do serviço de ingestão.
            - id: v1-ingestion
              uri: ${MS_INGESTION_URI:http://localhost:8082}
              predicates:
                - Path=/api/v1/ingestion/**
              filters:
                - RewritePath=/api/v1/ingestion(?<segment>.*), /ingestion/api/import$\{segment}
                - name: CircuitBreaker
                  args:
                    name: cb-ingestion
                    fallbackUri: forward:/__gateway/fallback
                - name: Retry
                  args:
                    retries: 2
                    methods: GET
                    series: SERVER_ERROR
                    exceptions:
                      - java.io.IOException
                    backoff:
                      firstBackoff: 50ms
                      maxBackoff: 500ms
                      factor: 2
                      basedOnPreviousValue: false
              metadata:
                response-timeout: 4000
                connect-timeout: 2000

            # Configura a rota versionada do serviço de categorização.
            - id: v1-categorization
              uri: ${MS_CATEGORIZATION_URI:http://localhost:8083}
              predicates:
                - Path=/api/v1/categorization/**
              filters:
                - RewritePath=/api/v1/categorization(?<segment>.*), /categorization/api/categorization/v1$\{segment}
                - name: CircuitBreaker
                  args:
                    name: cb-categorization
                    fallbackUri: forward:/__gateway/fallback
                - name: Retry
                  args:
                    retries: 2
                    methods: GET
                    series: SERVER_ERROR
                    exceptions:
                      - java.io.IOException
                    backoff:
                      firstBackoff: 50ms
                      maxBackoff: 500ms
                      factor: 2
                      basedOnPreviousValue: false
              metadata:
                response-timeout: 4000
                connect-timeout: 2000

            # Configura a rota versionada do serviço de orçamentos.
            - id: v1-budgeting
              uri: ${MS_BUDGETING_URI:http://localhost:8084}
              predicates:
                - Path=/api/v1/budgeting/**
              filters:
                - RewritePath=/api/v1/budgeting(?<segment>.*), /budgeting/api/budgeting/v1$\{segment}
                - name: CircuitBreaker
                  args:
                    name: cb-budgeting
                    fallbackUri: forward:/__gateway/fallback
                - name: Retry
                  args:
                    retries: 2
                    methods: GET
                    series: SERVER_ERROR
                    exceptions:
                      - java.io.IOException
                    backoff:
                      firstBackoff: 50ms
                      maxBackoff: 500ms
                      factor: 2
                      basedOnPreviousValue: false
              metadata:
                response-timeout: 4000
                connect-timeout: 2000

            # Configura a rota versionada do serviço de insights.
            - id: v1-insights
              uri: ${MS_INSIGHTS_URI:http://localhost:8085}
              predicates:
                - Path=/api/v1/insights/**
              filters:
                - RewritePath=/api/v1/insights(?<segment>.*), /insights/api/insights/v1$\{segment}
                - name: CircuitBreaker
                  args:
                    name: cb-insights
                    fallbackUri: forward:/__gateway/fallback
                - name: Retry
                  args:
                    retries: 2
                    methods: GET
                    series: SERVER_ERROR
                    exceptions:
                      - java.io.IOException
                    backoff:
                      firstBackoff: 50ms
                      maxBackoff: 500ms
                      factor: 2
                      basedOnPreviousValue: false
              metadata:
                response-timeout: 4000
                connect-timeout: 2000

            # Configura a rota versionada do serviço de notificações.
            - id: v1-notification
              uri: ${MS_NOTIFICATION_URI:http://localhost:8086}
              predicates:
                - Path=/api/v1/notification/**
              filters:
                - RewritePath=/api/v1/notification(?<segment>.*), /notification/api/notification/v1$\{segment}
                - name: CircuitBreaker
                  args:
                    name: cb-notification
                    fallbackUri: forward:/__gateway/fallback
                - name: Retry
                  args:
                    retries: 2
                    methods: GET
                    series: SERVER_ERROR
                    exceptions:
                      - java.io.IOException
                    backoff:
                      firstBackoff: 50ms
                      maxBackoff: 500ms
                      factor: 2
                      basedOnPreviousValue: false
              metadata:
                response-timeout: 4000
                connect-timeout: 2000

            # Mantém a rota legada do serviço de autenticação.
            - id: ms-auth
              uri: ${MS_AUTH_URI:http://localhost:8081}
              predicates:
                - Path=/auth/**

            # Mantém a rota legada do serviço de ingestão.
            - id: ms-ingestion
              uri: ${MS_INGESTION_URI:http://localhost:8082}
              predicates:
                - Path=/ingestion/**

            # Mantém a rota legada do serviço de categorização.
            - id: ms-categorization
              uri: ${MS_CATEGORIZATION_URI:http://localhost:8083}
              predicates:
                - Path=/categorization/**

            # Mantém a rota legada do serviço de orçamentos.
            - id: ms-budgeting
              uri: ${MS_BUDGETING_URI:http://localhost:8084}
              predicates:
                - Path=/budgeting/**

            # Mantém a rota legada do serviço de insights.
            - id: ms-insights
              uri: ${MS_INSIGHTS_URI:http://localhost:8085}
              predicates:
                - Path=/insights/**

            # Mantém a rota legada do serviço de notificações.
            - id: ms-notification
              uri: ${MS_NOTIFICATION_URI:http://localhost:8086}
              predicates:
                - Path=/notification/**

            # Mantém a rota legada do serviço de usuários.
            - id: ms-users
              uri: ${MS_USERS_URI:http://localhost:8087}
              predicates:
                - Path=/users/**

# Configura os recursos transversais do Gateway.
ecofy:
  gateway:
    # Limita o tamanho do correlation ID recebido.
    correlation:
      max-length: 128

    # Configura a política CORS conforme o ambiente.
    cors:
      allowed-origins:
        - ${ECOFY_CORS_ALLOWED_ORIGIN:http://localhost:3000}
      allowed-methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      allowed-headers: [Authorization, Content-Type, X-Correlation-Id]
      exposed-headers: [X-Correlation-Id]
      allow-credentials: false
      max-age: 3600

    # Configura a política padrão de resiliência.
    resilience:
      circuit-breaker:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        time-limiter-timeout: 10s

# Expõe os endpoints necessários para saúde e métricas.
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  # Inclui o correlation ID no padrão dos logs.
  pattern:
    level: "%5p [correlationId=%X{correlationId:-}]"
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO
