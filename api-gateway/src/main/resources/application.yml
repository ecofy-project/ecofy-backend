server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:
          enabled: true

          default-filters:
            - RemoveRequestHeader=Cookie
            - AddRequestHeader=X-Gateway, api-gateway

          routes:
            - id: ms-auth
              uri: ${MS_AUTH_URI:http://localhost:8081}
              predicates:
                - Path=/auth/**

            - id: ms-ingestion
              uri: ${MS_INGESTION_URI:http://localhost:8082}
              predicates:
                - Path=/ingestion/**

            - id: ms-categorization
              uri: ${MS_CATEGORIZATION_URI:http://localhost:8083}
              predicates:
                - Path=/categorization/**

            - id: ms-budgeting
              uri: ${MS_BUDGETING_URI:http://localhost:8084}
              predicates:
                - Path=/budgeting/**

            - id: ms-insights
              uri: ${MS_INSIGHTS_URI:http://localhost:8085}
              predicates:
                - Path=/insights/**

            - id: ms-notification
              uri: ${MS_NOTIFICATION_URI:http://localhost:8086}
              predicates:
                - Path=/notification/**

            - id: ms-users
              uri: ${MS_USERS_URI:http://localhost:8087}
              predicates:
                - Path=/users/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping: DEBUG
    reactor.netty.http.client: INFO

