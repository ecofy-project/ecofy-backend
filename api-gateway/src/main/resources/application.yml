server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:
          enabled: true

          # Filtros aplicados a TODAS as rotas.
          # - RemoveRequestHeader=Cookie: o gateway não repassa cookies do browser aos MS.
          #   (NÃO afeta o header Authorization, que é preservado e repassado downstream.)
          # - AddRequestHeader=X-Gateway: marca a origem da requisição para diagnóstico.
          default-filters:
            - RemoveRequestHeader=Cookie
            - AddRequestHeader=X-Gateway, api-gateway

          # Estratégia OFICIAL de roteamento: ROTAS ESTÁTICAS declarativas.
          # Cada MS é acessado por um prefixo público estável (/auth, /users...).
          # As URIs usam variável de ambiente com fallback local (execução dev).
          routes:
            - id: ms-auth
              uri: ${MS_AUTH_URI:http://localhost:8081}
              predicates:
                - Path=/auth/**

            - id: ms-ingestion
              uri: ${MS_INGESTION_URI:http://localhost:8082}
              predicates:
                - Path=/ingestion/**

            - id: ms-categorization
              uri: ${MS_CATEGORIZATION_URI:http://localhost:8083}
              predicates:
                - Path=/categorization/**

            - id: ms-budgeting
              uri: ${MS_BUDGETING_URI:http://localhost:8084}
              predicates:
                - Path=/budgeting/**

            - id: ms-insights
              uri: ${MS_INSIGHTS_URI:http://localhost:8085}
              predicates:
                - Path=/insights/**

            - id: ms-notification
              uri: ${MS_NOTIFICATION_URI:http://localhost:8086}
              predicates:
                - Path=/notification/**

            - id: ms-users
              uri: ${MS_USERS_URI:http://localhost:8087}
              predicates:
                - Path=/users/**

# Actuator — exposição CONSERVADORA no profile default.
# Apenas health e info ficam expostos. O endpoint operacional 'gateway'
# (que lista rotas/filtros) NÃO fica exposto no default nem em prod.
# Para diagnóstico, use o profile 'dev' (SPRING_PROFILES_ACTIVE=dev), que
# expõe 'gateway'. Em produção use 'prod' (exposição mínima: health).
management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO
