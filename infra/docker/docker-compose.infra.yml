services:

  # Kafka (único)
  kafka:
    image: apache/kafka:4.1.1
    container_name: ecofy-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"      # opcional manter, mas recomendo usar 19092 como externo
      - "19092:19092"    # externo (host)
      - "9093:9093"      # controller
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:19092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - ecofy-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "bash -lc 'unset JMX_PORT; /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1'" ]
      interval: 15s
      timeout: 10s
      retries: 10
    networks: [ ecofy-net ]


  kafka-init:
    image: apache/kafka:4.1.1
    container_name: ecofy-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: "kafka:9092"
      TOPICS_FILE: "/scripts/../topics.yml"
    volumes:
      - ../kafka/scripts:/scripts:ro
      - ../kafka/topics.yml:/topics.yml:ro  # (opcional) alternativa mais explícita
    entrypoint: [ "bash", "-lc", "/scripts/create-topics.sh" ]
    networks: [ ecofy-net ]
    restart: "no"

  # Postgres (um por MS)
  postgres-auth:
    image: postgres:16-alpine
    container_name: ecofy-postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecofy_auth
      POSTGRES_USER: ecofy_auth
      POSTGRES_PASSWORD: ecofy_auth
      TZ: UTC

    ports:
      - "5432:5432"
    volumes:
      - ecofy-auth-db-data:/var/lib/postgresql/data
      - ../postgres/init/auth:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecofy_auth -d ecofy_auth"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ecofy-net]

  postgres-ingestion:
    image: postgres:16-alpine
    container_name: ecofy-postgres-ingestion
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecofy_ingestion
      POSTGRES_USER: ecofy_ingestion
      POSTGRES_PASSWORD: ecofy_ingestion
      TZ: UTC
    ports:
      - "5434:5432"
    volumes:
      - ecofy-ingestion-db-data:/var/lib/postgresql/data
      - ../postgres/init/ingestion:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecofy_ingestion -d ecofy_ingestion"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ecofy-net]

  postgres-categorization:
    image: postgres:16-alpine
    container_name: ecofy-postgres-categorization
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecofy_categorization
      POSTGRES_USER: ecofy_categorization
      POSTGRES_PASSWORD: ecofy_categorization
      TZ: UTC
    ports:
      - "5435:5432"
    volumes:
      - ecofy-categorization-db-data:/var/lib/postgresql/data
      - ../postgres/init/categorization:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecofy_categorization -d ecofy_categorization"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ecofy-net]

  postgres-budgeting:
    image: postgres:16-alpine
    container_name: ecofy-postgres-budgeting
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecofy_budgeting
      POSTGRES_USER: ecofy_budgeting
      POSTGRES_PASSWORD: ecofy_budgeting
      TZ: UTC
    ports:
      - "5436:5432"
    volumes:
      - ecofy-budgeting-db-data:/var/lib/postgresql/data
      - ../postgres/init/budgeting:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecofy_budgeting -d ecofy_budgeting"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ecofy-net]

  postgres-insights:
    image: postgres:16-alpine
    container_name: ecofy-postgres-insights
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecofy_insights
      POSTGRES_USER: ecofy_insights
      POSTGRES_PASSWORD: ecofy_insights
      TZ: UTC
    ports:
      - "5437:5432"
    volumes:
      - ecofy-insights-db-data:/var/lib/postgresql/data
      - ../postgres/init/insights:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecofy_insights -d ecofy_insights"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ecofy-net]

  postgres-users:
    image: postgres:16-alpine
    container_name: ecofy-postgres-users
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecofy_users
      POSTGRES_USER: ecofy_users
      POSTGRES_PASSWORD: ecofy_users
      TZ: UTC
    ports:
      - "5438:5432"
    volumes:
      - ecofy-users-db-data:/var/lib/postgresql/data
      - ../postgres/init/users:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecofy_users -d ecofy_users"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ecofy-net]

  # Mongo (notification)
  mongo-notification:
    image: mongo:7
    container_name: ecofy-mongo-notification
    restart: unless-stopped
    environment:
      TZ: UTC
      MONGO_INITDB_DATABASE: ecofy_notification
    ports:
      - "27017:27017"
    volumes:
      - ecofy-notification-mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ecofy-net]

  # Mail (ms-auth)
  maildev:
    image: maildev/maildev
    container_name: ecofy-maildev
    restart: unless-stopped
    ports:
      - "1080:1080"
      - "1025:1025"
    networks: [ecofy-net]

  # Redis (ms-auth) — ECO-06: store distribuído para rate limiting + brute force.
  # Obrigatório ser distribuído (nada de memória local em prod). AOF ligado para
  # não perder contadores/bloqueios em restart; maxmemory-policy=noeviction para
  # NUNCA descartar silenciosamente contadores de limite (correção > economia).
  # Dev sem senha (rede local); em prod exija senha/TLS via secret externo.
  redis-auth:
    image: redis:7-alpine
    container_name: ecofy-redis-auth
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    volumes:
      - ecofy-auth-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ecofy-net]

  # Redis (ms-insights) — ECO-28 (Etapa 7): cache distribuído do dashboard/metrics.
  # Distribuído para servir múltiplas instâncias do ms-insights sem cache local divergente.
  # Cache é descartável (TTL): allkeys-lru é adequado (diferente do redis-auth, noeviction).
  redis-insights:
    image: redis:7-alpine
    container_name: ecofy-redis-insights
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6380:6379"
    volumes:
      - ecofy-insights-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ecofy-net]

networks:
  # Nome fixo: os composes por serviço anexam-se a esta mesma rede como externa.
  ecofy-net:
    name: ecofy-net

volumes:
  ecofy-kafka-data:
  ecofy-auth-db-data:
  ecofy-auth-redis-data:
  ecofy-ingestion-db-data:
  ecofy-categorization-db-data:
  ecofy-budgeting-db-data:
  ecofy-insights-db-data:
  ecofy-insights-redis-data:
  ecofy-users-db-data:
  ecofy-notification-mongo-data:
