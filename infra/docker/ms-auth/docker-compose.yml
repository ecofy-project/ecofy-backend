# =============================================================================
# EcoFy — ms-auth isolado (teste um a um)
#
# Pré-requisito: a infraestrutura precisa estar no ar, pois este arquivo anexa
# o serviço à rede externa ecofy-net em vez de recriar bancos e broker.
#
#   docker compose -f infra/docker/docker-compose.infra.yml up -d
#   docker compose -f infra/docker/ms-auth/docker-compose.yml up -d --build
#
# Dependências de infraestrutura: postgres-auth, redis-auth, kafka, maildev
# =============================================================================

services:

  ms-auth:
    build:
      context: ../../../ms-auth
    image: ecofy/ms-auth:local
    container_name: ecofy-ms-auth
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: jdbc:postgresql://postgres-auth:5432/ecofy_auth
      DB_USER: ecofy_auth
      DB_PASS: ecofy_auth
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis-auth
      REDIS_PORT: 6379
      MAIL_HOST: maildev
      MAIL_PORT: 1025
      JWT_ISSUER: http://localhost:8081/auth
      USERS_MS_BASE_URL: http://ms-users:8087/users
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-local-internal-token}
      TZ: UTC
    ports:
      - "8081:8081"
    networks: [ ecofy-net ]

networks:
  # Criada pelo docker-compose.infra.yml; aqui é apenas referenciada.
  ecofy-net:
    external: true
    name: ecofy-net
