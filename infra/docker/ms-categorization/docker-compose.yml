# =============================================================================
# EcoFy — ms-categorization isolado (teste um a um)
#
# Pré-requisito: a infraestrutura precisa estar no ar, pois este arquivo anexa
# o serviço à rede externa ecofy-net em vez de recriar bancos e broker.
#
#   docker compose -f infra/docker/docker-compose.infra.yml up -d
#   docker compose -f infra/docker/ms-categorization/docker-compose.yml up -d --build
#
# Dependências de infraestrutura: postgres-categorization, kafka
# =============================================================================

services:

  ms-categorization:
    build:
      context: ../../../ms-categorization
    image: ecofy/ms-categorization:local
    container_name: ecofy-ms-categorization
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: jdbc:postgresql://postgres-categorization:5432/ecofy_categorization
      DB_USER: ecofy_categorization
      DB_PASS: ecofy_categorization
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_JWKS_URI: http://ms-auth:8081/auth/.well-known/jwks.json
      TZ: UTC
    ports:
      - "8083:8083"
    networks: [ ecofy-net ]

networks:
  # Criada pelo docker-compose.infra.yml; aqui é apenas referenciada.
  ecofy-net:
    external: true
    name: ecofy-net
