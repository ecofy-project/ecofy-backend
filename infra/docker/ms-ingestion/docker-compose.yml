# =============================================================================
# EcoFy — ms-ingestion isolado (teste um a um)
#
# Pré-requisito: a infraestrutura precisa estar no ar, pois este arquivo anexa
# o serviço à rede externa ecofy-net em vez de recriar bancos e broker.
#
#   docker compose -f infra/docker/docker-compose.infra.yml up -d
#   docker compose -f infra/docker/ms-ingestion/docker-compose.yml up -d --build
#
# Dependências de infraestrutura: postgres-ingestion, kafka
# =============================================================================

services:

  ms-ingestion:
    build:
      context: ../../../ms-ingestion
    image: ecofy/ms-ingestion:local
    container_name: ecofy-ms-ingestion
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: jdbc:postgresql://postgres-ingestion:5432/ecofy_ingestion
      DB_USER: ecofy_ingestion
      DB_PASS: ecofy_ingestion
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_JWKS_URI: http://ms-auth:8081/auth/.well-known/jwks.json
      ING_STORAGE_BASE_PATH: /var/lib/ecofy/ms-ingestion/storage
      ING_STORAGE_TMP_DIR: /var/lib/ecofy/ms-ingestion/tmp
      TZ: UTC
    ports:
      - "8082:8082"
    volumes:
      - ecofy-ingestion-storage:/var/lib/ecofy/ms-ingestion
    networks: [ ecofy-net ]

volumes:
  ecofy-ingestion-storage:

networks:
  # Criada pelo docker-compose.infra.yml; aqui é apenas referenciada.
  ecofy-net:
    external: true
    name: ecofy-net
