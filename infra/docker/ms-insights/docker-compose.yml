# =============================================================================
# EcoFy — ms-insights isolado (teste um a um)
#
# Pré-requisito: a infraestrutura precisa estar no ar, pois este arquivo anexa
# o serviço à rede externa ecofy-net em vez de recriar bancos e broker.
#
#   docker compose -f infra/docker/docker-compose.infra.yml up -d
#   docker compose -f infra/docker/ms-insights/docker-compose.yml up -d --build
#
# Dependências de infraestrutura: postgres-insights, redis-insights, kafka
# =============================================================================

services:

  ms-insights:
    build:
      context: ../../../ms-insights
    image: ecofy/ms-insights:local
    container_name: ecofy-ms-insights
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: jdbc:postgresql://postgres-insights:5432/ecofy_insights
      DB_USER: ecofy_insights
      DB_PASS: ecofy_insights
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_JWKS_URI: http://ms-auth:8081/auth/.well-known/jwks.json
      REDIS_HOST: redis-insights
      REDIS_PORT: 6379
      INS_CLIENT_CATEGORIZATION_BASE_URL: http://ms-categorization:8083/categorization
      INS_CLIENT_BUDGETING_BASE_URL: http://ms-budgeting:8084/budgeting
      TZ: UTC
    ports:
      - "8085:8085"
    networks: [ ecofy-net ]

networks:
  # Criada pelo docker-compose.infra.yml; aqui é apenas referenciada.
  ecofy-net:
    external: true
    name: ecofy-net
