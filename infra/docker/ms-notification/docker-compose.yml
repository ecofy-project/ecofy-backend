# =============================================================================
# EcoFy — ms-notification isolado (teste um a um)
#
# Pré-requisito: a infraestrutura precisa estar no ar, pois este arquivo anexa
# o serviço à rede externa ecofy-net em vez de recriar bancos e broker.
#
#   docker compose -f infra/docker/docker-compose.infra.yml up -d
#   docker compose -f infra/docker/ms-notification/docker-compose.yml up -d --build
#
# Dependências de infraestrutura: mongo-notification, kafka
# =============================================================================

services:

  ms-notification:
    build:
      context: ../../../ms-notification
    image: ecofy/ms-notification:local
    container_name: ecofy-ms-notification
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      MONGO_URI: mongodb://mongo-notification:27017/ecofy_notification
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_JWKS_URI: http://ms-auth:8081/auth/.well-known/jwks.json
      ECOFY_USERS_INTERNAL_URL: http://ms-users:8087/users
      ECOFY_INTERNAL_SERVICE_TOKEN: ${INTERNAL_TOKEN:-local-internal-token}
      TZ: UTC
    ports:
      - "8086:8086"
    networks: [ ecofy-net ]

networks:
  # Criada pelo docker-compose.infra.yml; aqui é apenas referenciada.
  ecofy-net:
    external: true
    name: ecofy-net
