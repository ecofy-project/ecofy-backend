# =============================================================================
# EcoFy — ms-users isolado (teste um a um)
#
# Pré-requisito: a infraestrutura precisa estar no ar, pois este arquivo anexa
# o serviço à rede externa ecofy-net em vez de recriar bancos e broker.
#
#   docker compose -f infra/docker/docker-compose.infra.yml up -d
#   docker compose -f infra/docker/ms-users/docker-compose.yml up -d --build
#
# Dependências de infraestrutura: postgres-users, kafka
# =============================================================================

services:

  ms-users:
    build:
      context: ../../../ms-users
    image: ecofy/ms-users:local
    container_name: ecofy-ms-users
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: jdbc:postgresql://postgres-users:5432/ecofy_users
      DB_USER: ecofy_users
      DB_PASS: ecofy_users
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_JWKS_URI: http://ms-auth:8081/auth/.well-known/jwks.json
      AUTH_MS_BASE_URL: http://ms-auth:8081/auth
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-local-internal-token}
      TZ: UTC
    ports:
      - "8087:8087"
    networks: [ ecofy-net ]

networks:
  # Criada pelo docker-compose.infra.yml; aqui é apenas referenciada.
  ecofy-net:
    external: true
    name: ecofy-net
