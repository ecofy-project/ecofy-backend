# BASE / DEV (default)
server:
  port: 8081                 # porta do ms-auth
  servlet:
    context-path: /auth       # base path do serviço
  shutdown: graceful          # encerra com segurança
  compression:
    enabled: true             # gzip/deflate
    mime-types: >
      text/html,text/xml,text/plain,text/css,
      text/javascript,application/javascript,
      application/json,application/xml
    min-response-size: 1024   # só comprime acima disso
  forward-headers-strategy: framework  # lê X-Forwarded-* (proxy/gateway)

spring:
  application:
    name: ms-auth             # nome do serviço

  main:
    allow-bean-definition-overriding: false
    keep-alive: true
    web-application-type: servlet
    threads:
      virtual:
        enabled: true         # threads virtuais (Java 21+/Boot 4)

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ecofy_auth}   # dev local
    username: ${DB_USER:ecofy_auth}
    password: ${DB_PASS:ecofy_auth}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: MsAuthHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 0   # 0 desliga

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate       # não cria tabelas (usa Flyway)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true  # baseline automático (evite em prod)
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092} # dev local
    client-id: ms-auth
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    properties:
      security.protocol: PLAINTEXT  # dev (em prod usar SSL/SASL_SSL)

  mail:
    host: ${MAIL_HOST:smtp.mailtrap.io} # dev
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

  sql:
    init:
      mode: never

security:
  jwt:
    issuer: ${JWT_ISSUER:http://localhost:8081/auth} # issuer local
    audience: ${JWT_AUDIENCE:ecofy-api}
    key-id: ${JWT_KEY_ID:ecofy-auth-key-1}
    private-key-location: ${JWT_PRIVATE_KEY_LOCATION:classpath:keys/ecofy-auth-private.pem}
    public-key-location: ${JWT_PUBLIC_KEY_LOCATION:classpath:keys/ecofy-auth-public.pem}
    access-token-ttl-seconds: ${JWT_ACCESS_TTL:900}        # 15 min
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:2592000}  # 30 dias
    clock-skew-seconds: 60

ecofy:

  users-ms:
    enabled: true
    base-url: ${USERS_MS_BASE_URL:http://localhost:8087/users}
    internal-token: ${INTERNAL_TOKEN:local-internal-token}

  mail:
    from: ${MAIL_FROM:no-reply@ecofy.local}
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
    templates-base-path: classpath:/mail-templates

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    mail:
      enabled: true
    db:
      enabled: true
    kafka:
      enabled: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

cors:
  allowed-origins: "http://localhost:3000"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"

logging:
  level:
    root: INFO
    br.com.ecofy.auth: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE


# PROFILE: test
---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: ${DB_URL_TEST:jdbc:postgresql://localhost:5433/ecofy_auth_test}
    username: ${DB_USER_TEST:ecofy_auth_test}
    password: ${DB_PASS_TEST:}   # sem default fraco

  jpa:
    hibernate:
      ddl-auto: create-drop       # cria e apaga no fim
    show-sql: false
    open-in-view: false

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS_TEST:localhost:9093}

logging:
  level:
    root: WARN
    br.com.ecofy.auth: INFO

security:
  jwt:
    issuer: ${JWT_ISSUER_TEST:http://localhost:8081/test}

ecofy:
  mail:
    frontend-base-url: ${FRONTEND_BASE_URL_TEST:http://localhost:3000}


# PROFILE: prod
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}             # sem default local
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      pool-name: MsAuthHikariPool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false} # default false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}            # sem default local
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL} # default seguro

  mail:
    host: ${MAIL_HOST:smtp.sendgrid.net}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}      # obrigatório
    password: ${MAIL_PASSWORD}      # obrigatório
    protocol: smtp
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

logging:
  level:
    root: INFO
    br.com.ecofy.auth: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN

security:
  jwt:
    issuer: ${JWT_ISSUER}                # obrigatório
    audience: ${JWT_AUDIENCE:ecofy-api}
    key-id: ${JWT_KEY_ID:ecofy-auth-key-1}
    private-key-location: ${JWT_PRIVATE_KEY_LOCATION} # obrigatório
    public-key-location: ${JWT_PUBLIC_KEY_LOCATION}   # obrigatório

ecofy:
  mail:
    from: ${MAIL_FROM:no-reply@ecofy.com}
    frontend-base-url: ${FRONTEND_BASE_URL}            # obrigatório
    templates-base-path: classpath:/mail-templates
