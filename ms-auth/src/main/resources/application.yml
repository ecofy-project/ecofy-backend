server:
  port: 8081
  servlet:
    context-path: /auth
  shutdown: graceful
  compression:
    enabled: true
    mime-types: >
      text/html,text/xml,text/plain,text/css,
      text/javascript,application/javascript,
      application/json,application/xml
    min-response-size: 1024
  forward-headers-strategy: framework

spring:
  application:
    name: ms-auth

  main:
    allow-bean-definition-overriding: false
    keep-alive: true
    web-application-type: servlet
    threads:
      virtual:
        enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ecofy_auth}
    username: ${DB_USER:ecofy_auth}
    password: ${DB_PASS:ecofy_auth}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: MsAuthHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 0

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    # Permite o baseline automático somente no ambiente local.
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    client-id: ms-auth
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    properties:
      # Utiliza transporte sem TLS somente no ambiente local.
      security.protocol: PLAINTEXT

  # Configura o Redis compartilhado para rate limiting e brute force.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2s}

  mail:
    host: ${MAIL_HOST:smtp.mailtrap.io}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

  sql:
    init:
      mode: never

security:
  jwt:
    issuer: ${JWT_ISSUER:http://localhost:8081/auth}
    audience: ${JWT_AUDIENCE:ecofy-api}
    key-id: ${JWT_KEY_ID:ecofy-auth-key-1}
    private-key-location: ${JWT_PRIVATE_KEY_LOCATION:classpath:keys/ecofy-auth-private.pem}
    public-key-location: ${JWT_PUBLIC_KEY_LOCATION:classpath:keys/ecofy-auth-public.pem}
    access-token-ttl-seconds: ${JWT_ACCESS_TTL:900}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:2592000}
    clock-skew-seconds: 60

ecofy:
  users-ms:
    enabled: true
    base-url: ${USERS_MS_BASE_URL:http://localhost:8087/users}
    internal-token: ${INTERNAL_TOKEN:local-internal-token}

  auth:
    # Configura o tópico compartilhado com o consumidor do ms-users.
    kafka:
      user-registered-topic: ${ECOFY_AUTH_USER_REGISTERED_TOPIC:auth.user.registered}

    # Configura uma política de rate limiting para cada operação sensível.
    rate-limit:
      enabled: ${ECOFY_AUTH_RATE_LIMIT_ENABLED:true}

      # Restringe a confiança em headers encaminhados aos proxies conhecidos.
      trusted-proxies:
        - 127.0.0.1
        - "::1"
        - 10.
        - 172.
        - 192.168.

      policies:
        login:
          limit: ${ECOFY_AUTH_RL_LOGIN_LIMIT:5}
          window: ${ECOFY_AUTH_RL_LOGIN_WINDOW:1m}

        register:
          limit: ${ECOFY_AUTH_RL_REGISTER_LIMIT:10}
          window: ${ECOFY_AUTH_RL_REGISTER_WINDOW:5m}

        refresh:
          limit: ${ECOFY_AUTH_RL_REFRESH_LIMIT:30}
          window: ${ECOFY_AUTH_RL_REFRESH_WINDOW:1m}

        password-reset:
          limit: ${ECOFY_AUTH_RL_PASSWORD_RESET_LIMIT:3}
          window: ${ECOFY_AUTH_RL_PASSWORD_RESET_WINDOW:15m}

        validate:
          limit: ${ECOFY_AUTH_RL_VALIDATE_LIMIT:60}
          window: ${ECOFY_AUTH_RL_VALIDATE_WINDOW:1m}

    # Configura a chave ativa e as chaves mantidas durante a rotação.
    keys:
      allow-generated-key: ${ECOFY_AUTH_ALLOW_GENERATED_KEY:true}
      active-kid: ${ECOFY_AUTH_ACTIVE_KEY_ID:local-dev-key}
      algorithm: RS256
      active-private-key: ${ECOFY_AUTH_ACTIVE_PRIVATE_KEY:}
      active-private-key-location: ${ECOFY_AUTH_ACTIVE_PRIVATE_KEY_LOCATION:}

      # Mantém chaves anteriores disponíveis além da validade dos tokens.
      retention-window: ${ECOFY_AUTH_KEY_RETENTION:24h}

      retiring: []

    # Configura bloqueios temporários e progressivos por usuário e IP.
    brute-force:
      enabled: ${ECOFY_AUTH_BRUTE_FORCE_ENABLED:true}
      threshold: ${ECOFY_AUTH_BRUTE_FORCE_THRESHOLD:5}
      initial-block: ${ECOFY_AUTH_BLOCK_DURATION:5m}
      multiplier: ${ECOFY_AUTH_BLOCK_MULTIPLIER:2}
      max-block: ${ECOFY_AUTH_MAX_BLOCK_DURATION:24h}
      observation-window: ${ECOFY_AUTH_BRUTE_FORCE_WINDOW:15m}

  mail:
    from: ${MAIL_FROM:no-reply@ecofy.local}
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
    templates-base-path: classpath:/mail-templates

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: when_authorized

  health:
    mail:
      enabled: true
    db:
      enabled: true
    kafka:
      enabled: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs

  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

cors:
  allowed-origins: "http://localhost:3000"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"

logging:
  # Propaga o correlation ID armazenado no MDC para os logs.
  pattern:
    level: "%5p [correlationId=%X{correlationId:-}]"

  level:
    root: INFO
    br.com.ecofy.auth: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

