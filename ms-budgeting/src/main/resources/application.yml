server:
  port: 8084
  servlet:
    context-path: /budgeting
  shutdown: graceful
  compression:
    enabled: true
    mime-types: >
      text/html,text/xml,text/plain,text/css,
      text/javascript,application/javascript,
      application/json,application/xml
    min-response-size: 1024
  # Confia nos cabeçalhos X-Forwarded-* enviados pelo gateway.
  forward-headers-strategy: framework

spring:
  application:
    name: ms-budgeting

  main:
    allow-bean-definition-overriding: false
    keep-alive: true
    web-application-type: servlet
    threads:
      # Habilita threads virtuais para as requisições HTTP.
      virtual:
        enabled: true

  # Aponta para o banco local de desenvolvimento.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5436/ecofy_budgeting}
    username: ${DB_USER:ecofy_budgeting}
    password: ${DB_PASS:ecofy_budgeting}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: MsBudgetingHikariPool
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      # Desliga a detecção de vazamento de conexão.
      leak-detection-threshold: 0

  jpa:
    open-in-view: false
    hibernate:
      # Valida o schema em vez de criá-lo, já que as tabelas vêm do Flyway.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    # Cria a baseline automaticamente; evite manter isso ligado em produção.
    baseline-on-migrate: true
    default-schema: ${DB_SCHEMA:ecofy_budgeting}
    locations: classpath:db/migration

  kafka:
    # Aponta para o broker local de desenvolvimento.
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    client-id: ms-budgeting
    properties:
      # Usa conexão sem criptografia em desenvolvimento; produção sobrescreve o protocolo.
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}

    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:${spring.application.name}}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      max-poll-records: ${KAFKA_MAX_POLL_RECORDS:10}
      properties:
        spring.json.trusted.packages: ${KAFKA_TRUSTED_PACKAGES:br.com.ecofy.ms_budgeting.adapters.in.kafka.dto}
        spring.json.use.type.headers: false

    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Evita duplicar mensagens em caso de reenvio do producer.
        enable.idempotence: true

    listener:
      # Confirma o offset por mensagem processada.
      ack-mode: record

  jackson:
    time-zone: UTC

  sql:
    init:
      mode: never

  security:
    oauth2:
      resourceserver:
        jwt:
          # Aponta para o JWKS local do ms-auth.
          jwk-set-uri: ${JWT_JWKS_URI:http://localhost:8081/auth/.well-known/jwks.json}

ecofy:
  budgeting:
    # Libera apenas actuator e swagger: as rotas de budgets exigem JWT em todos os
    # ambientes, porque o dono do recurso é derivado da claim do token.
    security:
      permit-all: ${BGT_SECURITY_PERMIT_ALL:true}
      owner-claim: ${BGT_OWNER_CLAIM:sub}

    topics:
      categorized-transaction: ${BGT_TOPIC_TX_CATEGORIZED:eco.transaction.categorized}
      budget-alert: ${BGT_TOPIC_BUDGET_ALERT:eco.budget.alert}

    idempotency:
      ttl: ${BGT_IDEMPOTENCY_TTL:PT24H}

    alerts:
      warning-threshold-pct: ${BGT_ALERT_WARNING_PCT:80}
      critical-threshold-pct: ${BGT_ALERT_CRITICAL_PCT:95}
      publish-on-every-update: ${BGT_ALERT_PUBLISH_ON_EVERY_UPDATE:false}

    # Espelha a unidade monetária oficial usada pelo domínio.
    money:
      scale: ${BGT_MONEY_SCALE:2}
      rounding-mode: ${BGT_MONEY_ROUNDING:HALF_EVEN}
      default-currency: ${BGT_DEFAULT_CURRENCY:BRL}

    # Limita o tamanho das páginas, com max-size como teto obrigatório.
    pagination:
      default-size: ${BGT_PAGE_DEFAULT_SIZE:20}
      max-size: ${BGT_PAGE_MAX_SIZE:100}

    kafka:
      consumer-group: ${KAFKA_CONSUMER_GROUP_ID:ms-budgeting}
      supported-event-versions: ${BGT_SUPPORTED_EVENT_VERSIONS:1}
      # Define o campo usado como chave de partição do evento de alerta.
      partition-key-field: ${BGT_ALERT_PARTITION_KEY:userId}

    # Configura a Transactional Outbox de eventos de alerta.
    outbox:
      batch-size: ${BGT_OUTBOX_BATCH_SIZE:100}
      poll-interval: ${BGT_OUTBOX_POLL_INTERVAL:1s}
      max-attempts: ${BGT_OUTBOX_MAX_ATTEMPTS:10}
      initial-backoff: ${BGT_OUTBOX_INITIAL_BACKOFF:1s}
      backoff-multiplier: ${BGT_OUTBOX_BACKOFF_MULTIPLIER:2}
      max-backoff: ${BGT_OUTBOX_MAX_BACKOFF:5m}
      processing-timeout: ${BGT_OUTBOX_PROCESSING_TIMEOUT:5m}
      published-retention: ${BGT_OUTBOX_RETENTION:7d}
      cleanup-batch-size: ${BGT_OUTBOX_CLEANUP_BATCH:500}
      publish-timeout: ${BGT_OUTBOX_PUBLISH_TIMEOUT:10s}

    # Configura as rotinas agendadas de recálculo e limpeza.
    scheduling:
      enabled: ${BGT_SCHED_ENABLED:true}
      recalculation-enabled: ${BGT_SCHED_RECALC_ENABLED:true}
      cleanup-enabled: ${BGT_SCHED_CLEANUP_ENABLED:false}
      cleanup-retention-days: ${BGT_CLEANUP_RETENTION_DAYS:90}
      cleanup-cron: ${BGT_CLEANUP_CRON:0 0 3 * * *}
      recalculate-cron: ${BGT_RECALC_CRON:0 0/15 * * * *}

# Expõe os endpoints necessários para saúde e métricas.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
      # Mantém o health da Outbox fora de liveness e readiness: backlog represado não deve
      # reiniciar nem despejar o pod, já que reiniciar não restabelece o broker.
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
  health:
    db:
      enabled: true
    kafka:
      enabled: true
  metrics:
    # Identifica o serviço nas métricas com uma tag de baixa cardinalidade.
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

logging:
  level:
    root: INFO
    br.com.ecofy.ms_budgeting: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
