server:
  port: 8083
  servlet:
    context-path: /categorization
  shutdown: graceful
  compression:
    enabled: true
    mime-types: >
      text/html,text/xml,text/plain,text/css,
      text/javascript,application/javascript,
      application/json,application/xml
    min-response-size: 1024
  # Confia nos cabeçalhos X-Forwarded-* enviados pelo gateway.
  forward-headers-strategy: framework

spring:
  application:
    name: ms-categorization

  main:
    allow-bean-definition-overriding: false
    keep-alive: true
    web-application-type: servlet
    threads:
      # Habilita threads virtuais para as requisições HTTP.
      virtual:
        enabled: true

  # Aponta para o banco local de desenvolvimento.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/ecofy_categorization}
    username: ${DB_USER:ecofy_categorization}
    password: ${DB_PASS:ecofy_categorization}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: MsCategorizationHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      # Desliga a detecção de vazamento de conexão.
      leak-detection-threshold: 0

  jpa:
    open-in-view: false
    hibernate:
      # Valida o schema em vez de criá-lo, já que as tabelas vêm do Flyway.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    # Cria a baseline automaticamente; evite manter isso ligado em produção.
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    # Aponta para o broker local de desenvolvimento.
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    client-id: ms-categorization

    # Aplica as propriedades comuns a producer e consumer.
    properties:
      # Usa conexão sem criptografia em desenvolvimento; produção sobrescreve o protocolo.
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}

    consumer:
      # Versiona o consumer group e começa pelo offset mais recente, para que um serviço que
      # ficou fora do ar não reprocesse o tópico inteiro ao voltar.
      group-id: ${KAFKA_CONSUMER_GROUP_ID:ms-categorization-v2}
      # Envolve os deserializers reais para que uma falha de desserialização chegue ao error
      # handler e siga para a DLT, em vez de virar poison pill reentregue indefinidamente.
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      auto-offset-reset: latest
      max-poll-records: ${KAFKA_MAX_POLL_RECORDS:10}

      # Configura a desserialização JSON aqui, e não por código.
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "br.com.ecofy.ms_categorization.adapters.in.kafka.dto"
        spring.json.value.default.type: "br.com.ecofy.ms_categorization.adapters.in.kafka.dto.CategorizationRequestMessage"
        spring.json.use.type.headers: false
        # Tolera campos desconhecidos, permitindo que o produtor evolua o payload.
        spring.json.fail.on.unknown.properties: false

    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      # Configura a serialização JSON aqui, e não por código.
      properties:
        spring.json.add.type.headers: false
        enable.idempotence: true

    listener:
      # Confirma o offset por mensagem processada.
      ack-mode: record

  sql:
    init:
      mode: never

  security:
    oauth2:
      resourceserver:
        jwt:
          # Aponta para o JWKS local do ms-auth.
          jwk-set-uri: ${JWT_JWKS_URI:http://localhost:8081/auth/.well-known/jwks.json}

ecofy:
  categorization:
    # Libera a API em desenvolvimento e testes; produção exige JWT.
    security:
      permit-all: ${CAT_SECURITY_PERMIT_ALL:true}

    topics:
      categorization-request: ${CAT_TOPIC_REQUEST:eco.categorization.request}
      transaction-categorized: ${CAT_TOPIC_TX_CATEGORIZED:eco.transaction.categorized}
      categorization-applied: ${CAT_TOPIC_APPLIED:eco.categorization.applied}

    idempotency:
      ttl-seconds: ${CAT_IDEMPOTENCY_TTL_SECONDS:86400}

    rule-engine:
      max-rules-to-evaluate: ${CAT_RULE_MAX_RULES:200}
      best-score-wins: ${CAT_RULE_BEST_SCORE_WINS:true}
      min-score-to-categorize: ${CAT_RULE_MIN_SCORE:40}
      create-suggestion-when-unmatched: ${CAT_RULE_CREATE_SUGGESTION_WHEN_UNMATCHED:true}

    # Define a concorrência do consumo e a política de retry e DLT.
    kafka:
      # Espelha o consumer group nos headers da DLT.
      consumer-group: ${KAFKA_CONSUMER_GROUP_ID:ms-categorization-v2}
      # Acompanha o número de partições do tópico de entrada; acima disso a thread fica ociosa.
      concurrency: ${CAT_KAFKA_CONCURRENCY:3}
      dlt-suffix: ${CAT_KAFKA_DLT_SUFFIX:.dlt}
      supported-event-versions: ${CAT_SUPPORTED_EVENT_VERSIONS:1}
      retry:
        # Conta a entrega original entre as tentativas.
        max-attempts: ${CAT_RETRY_MAX_ATTEMPTS:3}
        initial-interval: ${CAT_RETRY_INITIAL:1s}
        multiplier: ${CAT_RETRY_MULTIPLIER:2}
        max-interval: ${CAT_RETRY_MAX:10s}

    # Configura a Transactional Outbox de eventos de categorização.
    outbox:
      batch-size: ${CAT_OUTBOX_BATCH_SIZE:100}
      poll-interval: ${CAT_OUTBOX_POLL_INTERVAL:1s}
      # Limita as tentativas antes do descarte auditável, sem permitir retry infinito.
      max-attempts: ${CAT_OUTBOX_MAX_ATTEMPTS:10}
      initial-backoff: ${CAT_OUTBOX_INITIAL_BACKOFF:1s}
      backoff-multiplier: ${CAT_OUTBOX_BACKOFF_MULTIPLIER:2}
      max-backoff: ${CAT_OUTBOX_MAX_BACKOFF:5m}
      # Libera os registros abandonados em processamento após este tempo.
      processing-timeout: ${CAT_OUTBOX_PROCESSING_TIMEOUT:5m}
      published-retention: ${CAT_OUTBOX_PUBLISHED_RETENTION:7d}
      cleanup-batch-size: ${CAT_OUTBOX_CLEANUP_BATCH:500}
      publish-timeout: ${CAT_OUTBOX_PUBLISH_TIMEOUT:10s}

# Expõe os endpoints necessários para saúde e métricas.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true
    kafka:
      enabled: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

# Libera a origem local do frontend durante o desenvolvimento.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}

logging:
  level:
    root: INFO
    br.com.ecofy.ms_categorization: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
