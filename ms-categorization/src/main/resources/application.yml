# BASE / DEV (default)
server:
  port: 8083                     # porta do ms-categorization
  servlet:
    context-path: /categorization # base path do serviço
  shutdown: graceful              # encerra com segurança
  compression:
    enabled: true                 # compressão HTTP
    mime-types: >
      text/html,text/xml,text/plain,text/css,
      text/javascript,application/javascript,
      application/json,application/xml
    min-response-size: 1024       # só comprime acima disso
  forward-headers-strategy: framework  # lê X-Forwarded-* (proxy/gateway)

spring:
  application:
    name: ms-categorization       # nome do serviço

  main:
    allow-bean-definition-overriding: false
    keep-alive: true
    web-application-type: servlet
    threads:
      virtual:
        enabled: true             # threads virtuais (Java 21+/Boot 4)

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/ecofy_categorization} # dev local
    username: ${DB_USER:ecofy_categorization}
    password: ${DB_PASS:ecofy_categorization}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: MsCategorizationHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 0   # 0 desliga

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate            # não cria tabelas (usa Flyway)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true       # baseline automático (evite em prod)
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092} # dev local
    client-id: ms-categorization
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}     # dev (prod usa SSL/SASL_SSL)

    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:${spring.application.name}}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      max-poll-records: ${KAFKA_MAX_POLL_RECORDS:10}

    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true     # evita duplicar publish

    listener:
      ack-mode: record               # commit por mensagem

  sql:
    init:
      mode: never

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWKS_URI:http://localhost:8081/auth/.well-known/jwks.json} # dev local

ecofy:
  categorization:
    topics:
      categorization-request: ${CAT_TOPIC_REQUEST:eco.categorization.request}
      transaction-categorized: ${CAT_TOPIC_TX_CATEGORIZED:eco.transaction.categorized}
      categorization-applied: ${CAT_TOPIC_APPLIED:eco.categorization.applied}

    idempotency:
      ttl-seconds: ${CAT_IDEMPOTENCY_TTL_SECONDS:86400}

    rule-engine:
      max-rules-to-evaluate: ${CAT_RULE_MAX_RULES:200}
      best-score-wins: ${CAT_RULE_BEST_SCORE_WINS:true}
      min-score-to-categorize: ${CAT_RULE_MIN_SCORE:40}
      create-suggestion-when-unmatched: ${CAT_RULE_CREATE_SUGGESTION_WHEN_UNMATCHED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true
    kafka:
      enabled: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}           # dev
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}

logging:
  level:
    root: INFO
    br.com.ecofy.ms_categorization: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE


# PROFILE: test
---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: ${DB_URL_TEST:jdbc:postgresql://localhost:5433/ecofy_categorization_test}
    username: ${DB_USER_TEST:ecofy_categorization_test}
    password: ${DB_PASS_TEST:}      # sem default fraco

  jpa:
    hibernate:
      ddl-auto: create-drop          # cria e apaga no fim
    show-sql: false
    open-in-view: false

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS_TEST:localhost:19092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID_TEST:ms-categorization-test}

logging:
  level:
    root: WARN
    br.com.ecofy.ms_categorization: INFO

ecofy:
  categorization:
    idempotency:
      ttl-seconds: 60
    rule-engine:
      max-rules-to-evaluate: 20
      min-score-to-categorize: 40
      create-suggestion-when-unmatched: true


# PROFILE: prod
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}                   # sem default local
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      pool-name: MsCategorizationHikariPool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false} # default false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}            # sem default local
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL} # default seguro

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWKS_URI}                       # obrigatório

logging:
  level:
    root: INFO
    br.com.ecofy.ms_categorization: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN

ecofy:
  categorization:
    topics:
      categorization-request: ${CAT_TOPIC_REQUEST:eco.categorization.request}
      transaction-categorized: ${CAT_TOPIC_TX_CATEGORIZED:eco.transaction.categorized}
      categorization-applied: ${CAT_TOPIC_APPLIED:eco.categorization.applied}

    idempotency:
      ttl-seconds: ${CAT_IDEMPOTENCY_TTL_SECONDS:86400}

    rule-engine:
      max-rules-to-evaluate: ${CAT_RULE_MAX_RULES:500}
      best-score-wins: ${CAT_RULE_BEST_SCORE_WINS:true}
      min-score-to-categorize: ${CAT_RULE_MIN_SCORE:40}
      create-suggestion-when-unmatched: ${CAT_RULE_CREATE_SUGGESTION_WHEN_UNMATCHED:true}
