# Configura o ambiente de produção.
spring:
  servlet:
    multipart:
      # Espelha o limite de ecofy.ingestion.upload.max-file-size.
      max-file-size: ${ECOFY_INGESTION_MAX_FILE_SIZE:20MB}
      max-request-size: ${ECOFY_INGESTION_MAX_REQUEST_SIZE:21MB}
      file-size-threshold: 256KB
      location: ${ING_STORAGE_TMP_DIR:/var/lib/ecofy/ms-ingestion/tmp}

  # Exige as credenciais do banco por variável de ambiente, sem default local.
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      pool-name: MsIngestionHikariPool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    # Mantém a baseline automática desligada por padrão em produção.
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}

  kafka:
    # Exige o endereço do broker por variável de ambiente, sem default local.
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      # Adota conexão autenticada e criptografada como padrão.
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}

  security:
    oauth2:
      resourceserver:
        jwt:
          # Exige o endereço do JWKS por variável de ambiente.
          jwk-set-uri: ${JWT_JWKS_URI}

# Reduz o nível dos logs em produção.
logging:
  level:
    root: INFO
    br.com.ecofy.ms_ingestion: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN

ecofy:
  ingestion:
    max-errors-per-job: ${ING_MAX_ERRORS_PER_JOB:1000}
    batch-size: ${ECOFY_INGESTION_BATCH_SIZE:500}
    # Exige autenticação em todas as rotas, inclusive actuator e swagger.
    security:
      permit-all: false
    # Declara os limites explicitamente, sem default silencioso equivalente a ilimitado.
    upload:
      max-file-size: ${ECOFY_INGESTION_MAX_FILE_SIZE:20MB}
      max-lines: ${ECOFY_INGESTION_MAX_LINES:200000}
      max-line-length: ${ECOFY_INGESTION_MAX_LINE_LENGTH:10000}
      max-field-length: ${ECOFY_INGESTION_MAX_FIELD_LENGTH:2048}
      max-columns: ${ECOFY_INGESTION_MAX_COLUMNS:50}
      max-recorded-errors: ${ECOFY_INGESTION_MAX_RECORDED_ERRORS:1000}
      processing-timeout: ${ECOFY_INGESTION_PROCESSING_TIMEOUT:15m}
    kafka:
      transaction-event-topic: ${ING_TOPIC_TX_EVENT:eco.tx.raw}
      dlt-suffix: ${ING_KAFKA_DLT_SUFFIX:.dlt}
      consumer-group: ${ING_KAFKA_CONSUMER_GROUP:ms-ingestion-tx-consumer}
      topics:
        transaction-imported: ${ING_TOPIC_TX_IMPORTED:eco.ingestion.transaction.imported}
        import-job-status-changed: ${ING_TOPIC_JOB_STATUS:eco.ingestion.import-job.status-changed}
        categorization-request: ${ING_TOPIC_CATEGORIZE:eco.categorization.request}
    storage:
      # Usa um diretório dedicado e persistente, fora de /tmp.
      base-path: ${ING_STORAGE_BASE_PATH:/var/lib/ecofy/ms-ingestion/storage}
      tmp-dir: ${ING_STORAGE_TMP_DIR:/var/lib/ecofy/ms-ingestion/tmp}
