# BASE / DEV (default)
server:
  port: 8082                  # porta do ms-ingestion
  servlet:
    context-path: /ingestion   # base path do serviço
  shutdown: graceful           # encerra com segurança
  compression:
    enabled: true              # compressão HTTP
    mime-types: >
      text/html,text/xml,text/plain,text/css,
      text/javascript,application/javascript,
      application/json,application/xml
    min-response-size: 1024    # só comprime acima disso
  forward-headers-strategy: framework  # lê X-Forwarded-* (proxy/gateway)

spring:
  application:
    name: ms-ingestion         # nome do serviço

  main:
    allow-bean-definition-overriding: false
    keep-alive: true
    web-application-type: servlet
    threads:
      virtual:
        enabled: true          # threads virtuais (Java 21+/Boot 4)

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/ecofy_ingestion} # dev local
    username: ${DB_USER:ecofy_ingestion}
    password: ${DB_PASS:ecofy_ingestion}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: MsIngestionHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 0   # 0 desliga

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate        # não cria tabelas (usa Flyway)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true   # baseline automático (evite em prod)
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092} # dev local
    client-id: ms-ingestion

    # Propriedades gerais do client Kafka (vale para producer/consumer)
    properties:
      security.protocol: PLAINTEXT # dev (prod usa SSL/SASL_SSL)

    consumer:
      group-id: ms-ingestion-tx-consumer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      # Configuração do JsonSerializer SOMENTE via properties (sem setters no Java)
      properties:
        spring.json.add.type.headers: false

  jackson:
    time-zone: UTC

  sql:
    init:
      mode: never

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWKS_URI:http://localhost:8081/auth/.well-known/jwks.json} # dev local

ecofy:
  ingestion:
    max-errors-per-job: ${ING_MAX_ERRORS_PER_JOB:100}           # limite por job
    async-processing-enabled: ${ING_ASYNC_ENABLED:true}         # processamento async

    topics:
      categorize-transactions: ${ING_TOPIC_CATEGORIZE:eco.categorization.request}
      ingestion-events: ${ING_TOPIC_EVENTS:eco.ingestion.events}

    storage:
      base-path: ${ING_STORAGE_BASE_PATH:./data/ms-ingestion}       # pasta base
      tmp-dir: ${ING_STORAGE_TMP_DIR:./data/ms-ingestion/tmp}       # temporários
      max-file-size-bytes: ${ING_STORAGE_MAX_FILE_SIZE:10485760}    # 10 MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true
    kafka:
      enabled: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

cors:
  allowed-origins: "http://localhost:3000"  # dev
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"

logging:
  level:
    root: INFO
    br.com.ecofy.ms_ingestion: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE


# PROFILE: test
---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: ${DB_URL_TEST:jdbc:postgresql://localhost:5433/ecofy_ingestion_test}
    username: ${DB_USER_TEST:ecofy_ingestion_test}
    password: ${DB_PASS_TEST:}   # sem default fraco

  jpa:
    hibernate:
      ddl-auto: create-drop       # cria e apaga no fim
    show-sql: false
    open-in-view: false

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS_TEST:localhost:19092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID_TEST:ms-ingestion-tx-consumer-test}

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWKS_URI_TEST:http://localhost:8081/auth/.well-known/jwks.json} # test/local

logging:
  level:
    root: WARN
    br.com.ecofy.ms_ingestion: INFO

ecofy:
  ingestion:
    max-errors-per-job: 10
    async-processing-enabled: false
    storage:
      base-path: ./data/ms-ingestion-test
      tmp-dir: ./data/ms-ingestion-test/tmp
      max-file-size-bytes: 5242880 # 5 MB


# PROFILE: prod
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}               # sem default local
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      pool-name: MsIngestionHikariPool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false} # default false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}            # sem default local
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL} # default seguro

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWKS_URI}                       # obrigatório

logging:
  level:
    root: INFO
    br.com.ecofy.ms_ingestion: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN

ecofy:
  ingestion:
    max-errors-per-job: ${ING_MAX_ERRORS_PER_JOB:500}
    async-processing-enabled: ${ING_ASYNC_ENABLED:true}
    topics:
      categorize-transactions: ${ING_TOPIC_CATEGORIZE:ecofy.tx.to-categorize}
      ingestion-events: ${ING_TOPIC_EVENTS:ecofy.ingestion.events}
    storage:
      base-path: ${ING_STORAGE_BASE_PATH:/var/lib/ecofy/ms-ingestion/storage}
      tmp-dir: ${ING_STORAGE_TMP_DIR:/var/lib/ecofy/ms-ingestion/tmp}
      max-file-size-bytes: ${ING_STORAGE_MAX_FILE_SIZE:20971520} # 20 MB
