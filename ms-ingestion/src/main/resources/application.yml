server:
  port: 8082
  servlet:
    context-path: /ingestion
  shutdown: graceful
  compression:
    enabled: true
    mime-types: >
      text/html,text/xml,text/plain,text/css,
      text/javascript,application/javascript,
      application/json,application/xml
    min-response-size: 1024
  # Confia nos cabeçalhos X-Forwarded-* enviados pelo gateway.
  forward-headers-strategy: framework

spring:
  application:
    name: ms-ingestion

  servlet:
    multipart:
      enabled: true
      # Corta o corpo da requisição antes de o arquivo inteiro ser aceito, como primeira
      # barreira de tamanho. Mantenha igual a ecofy.ingestion.upload.max-file-size, para que
      # o comportamento não dependa de qual barreira o arquivo encontra primeiro.
      max-file-size: ${ECOFY_INGESTION_MAX_FILE_SIZE:10MB}
      # Reserva folga sobre o arquivo para os demais campos do formulário.
      max-request-size: ${ECOFY_INGESTION_MAX_REQUEST_SIZE:11MB}
      # Envia o multipart para disco acima deste tamanho, permitindo que o controller receba
      # um stream sem manter o arquivo em memória.
      file-size-threshold: 256KB
      location: ${ING_STORAGE_TMP_DIR:./data/ms-ingestion/tmp}

  main:
    allow-bean-definition-overriding: false
    keep-alive: true
    web-application-type: servlet
    threads:
      # Habilita threads virtuais para as requisições HTTP.
      virtual:
        enabled: true

  # Aponta para o banco local de desenvolvimento.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/ecofy_ingestion}
    username: ${DB_USER:ecofy_ingestion}
    password: ${DB_PASS:ecofy_ingestion}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: MsIngestionHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      # Desliga a detecção de vazamento de conexão.
      leak-detection-threshold: 0

  jpa:
    open-in-view: false
    hibernate:
      # Valida o schema em vez de criá-lo, já que as tabelas vêm do Flyway.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    # Cria a baseline automaticamente; evite manter isso ligado em produção.
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    # Aponta para o broker local de desenvolvimento.
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    client-id: ms-ingestion

    # Aplica as propriedades comuns a producer e consumer.
    properties:
      # Usa conexão sem criptografia em desenvolvimento; produção sobrescreve o protocolo.
      security.protocol: PLAINTEXT

    consumer:
      group-id: ms-ingestion-tx-consumer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      # Mantém a configuração do serializador aqui, e não por código.
      properties:
        spring.json.add.type.headers: false

  jackson:
    time-zone: UTC

  sql:
    init:
      mode: never

  security:
    oauth2:
      resourceserver:
        jwt:
          # Aponta para o JWKS local do ms-auth.
          jwk-set-uri: ${JWT_JWKS_URI:http://localhost:8081/auth/.well-known/jwks.json}

ecofy:
  ingestion:
    # Considera o arquivo imprestável acima deste total de erros, marcando o job como falho.
    # O valor precisa ser maior ou igual a upload.max-recorded-errors, o que é validado no boot.
    max-errors-per-job: ${ING_MAX_ERRORS_PER_JOB:1000}
    # Define quantos registros são persistidos por transação curta.
    batch-size: ${ECOFY_INGESTION_BATCH_SIZE:500}
    max-jobs-per-retry: ${ING_MAX_JOBS_PER_RETRY:10}

    # Libera apenas actuator e swagger: as rotas de importação exigem JWT em todos os
    # ambientes, porque sem token não há dono e, portanto, não há idempotência nem ownership.
    security:
      permit-all: ${ING_SECURITY_PERMIT_ALL:true}

    # Limita o arquivo recebido em tamanho, linhas, colunas e tempo de processamento.
    upload:
      max-file-size: ${ECOFY_INGESTION_MAX_FILE_SIZE:10MB}
      max-lines: ${ECOFY_INGESTION_MAX_LINES:100000}
      max-line-length: ${ECOFY_INGESTION_MAX_LINE_LENGTH:10000}
      max-field-length: ${ECOFY_INGESTION_MAX_FIELD_LENGTH:2048}
      max-columns: ${ECOFY_INGESTION_MAX_COLUMNS:50}
      max-recorded-errors: ${ECOFY_INGESTION_MAX_RECORDED_ERRORS:1000}
      processing-timeout: ${ECOFY_INGESTION_PROCESSING_TIMEOUT:10m}
      charset: UTF-8
      allowed-extensions:
        - csv
        - ofx
      # Filtra o MIME declarado como verificação barata; o conteúdo real é quem decide.
      # Aceita text/plain e application/octet-stream porque navegadores os enviam para .csv.
      allowed-mime-types:
        - text/csv
        - application/csv
        - text/plain
        - application/octet-stream
        - application/x-ofx

    idempotency:
      algorithm: SHA-256
      header-name: Idempotency-Key
      max-key-length: 128

    # Limita o tamanho das páginas e restringe os campos aceitos na ordenação.
    pagination:
      default-size: ${ING_PAGE_DEFAULT_SIZE:20}
      max-size: ${ING_PAGE_MAX_SIZE:100}
      sortable-fields:
        - createdAt
        - finishedAt
        - status
        - fileName

    # Concentra os tópicos e a política de retry e DLT do consumo por evento.
    kafka:
      transaction-event-topic: ${ING_TOPIC_TX_EVENT:eco.tx.raw}
      dlt-suffix: ${ING_KAFKA_DLT_SUFFIX:.dlt}
      consumer-group: ${ING_KAFKA_CONSUMER_GROUP:ms-ingestion-tx-consumer}
      retry:
        # Conta a entrega original entre as tentativas.
        max-attempts: ${ING_KAFKA_RETRY_MAX_ATTEMPTS:3}
        initial-interval: ${ING_KAFKA_RETRY_INITIAL:1s}
        multiplier: ${ING_KAFKA_RETRY_MULTIPLIER:2}
        max-interval: ${ING_KAFKA_RETRY_MAX_INTERVAL:10s}
      topics:
        transaction-imported: ${ING_TOPIC_TX_IMPORTED:eco.ingestion.transaction.imported}
        import-job-status-changed: ${ING_TOPIC_JOB_STATUS:eco.ingestion.import-job.status-changed}
        categorization-request: ${ING_TOPIC_CATEGORIZE:eco.categorization.request}

    storage:
      base-path: ${ING_STORAGE_BASE_PATH:./data/ms-ingestion}
      tmp-dir: ${ING_STORAGE_TMP_DIR:./data/ms-ingestion/tmp}
      # Preserva o arquivo após o sucesso, porque o retry precisa relê-lo.
      delete-on-success: ${ING_STORAGE_DELETE_ON_SUCCESS:false}

# Expõe os endpoints necessários para saúde e métricas.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true
    kafka:
      enabled: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

# Libera a origem local do frontend durante o desenvolvimento.
cors:
  allowed-origins: "http://localhost:3000"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"

logging:
  level:
    root: INFO
    br.com.ecofy.ms_ingestion: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
