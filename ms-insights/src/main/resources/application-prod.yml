# Configura o ambiente de produção.
spring:
  # Exige as credenciais do banco por variável de ambiente, sem default local.
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      pool-name: MsInsightsHikariPool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    # Mantém a baseline automática desligada por padrão em produção.
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}
    default-schema: ${DB_SCHEMA:ecofy_insights}
    locations: classpath:db/migration

  kafka:
    # Exige o endereço do broker por variável de ambiente, sem default local.
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      # Adota conexão autenticada e criptografada como padrão.
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}

  security:
    oauth2:
      resourceserver:
        jwt:
          # Exige o endereço do JWKS por variável de ambiente.
          jwk-set-uri: ${JWT_JWKS_URI}

# Reduz o nível dos logs em produção.
logging:
  level:
    root: INFO
    br.com.ecofy.ms_insights: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN

ecofy:
  insights:
    # Exige autenticação em todas as rotas protegidas.
    security:
      permit-all: ${INS_SECURITY_PERMIT_ALL:false}

    topics:
      categorized-transaction-topic: ${INS_TOPIC_TX_CATEGORIZED:eco.transaction.categorized}
      budget-alert-topic: ${INS_TOPIC_BUDGET_ALERT:eco.budget.alert}
      insight-created-topic: ${INS_TOPIC_INSIGHT_CREATED:eco.insight.created}
      report-ready-topic: ${INS_TOPIC_REPORT_READY:eco.report.ready}

    idempotency:
      ttl: ${INS_IDEMPOTENCY_TTL:PT24H}

    generation:
      max-transactions-per-period: ${INS_MAX_TX_PER_PERIOD:2000}
      default-lookback-days: ${INS_DEFAULT_LOOKBACK_DAYS:30}
      min-anomaly-score: ${INS_MIN_ANOMALY_SCORE:75}
      persist-metric-snapshots: ${INS_PERSIST_METRICS:true}
      persist-trends: ${INS_PERSIST_TRENDS:true}

    clients:
      # Exige o endereço de cada integração por variável de ambiente quando ela estiver habilitada.
      categorization:
        enabled: ${INS_CLIENT_CATEGORIZATION_ENABLED:false}
        base-url: ${INS_CLIENT_CATEGORIZATION_BASE_URL}
        connect-timeout-ms: ${INS_CLIENT_CATEGORIZATION_CONNECT_TIMEOUT_MS:800}
        read-timeout-ms: ${INS_CLIENT_CATEGORIZATION_READ_TIMEOUT_MS:1500}

      budgeting:
        enabled: ${INS_CLIENT_BUDGETING_ENABLED:false}
        base-url: ${INS_CLIENT_BUDGETING_BASE_URL}
        connect-timeout-ms: ${INS_CLIENT_BUDGETING_CONNECT_TIMEOUT_MS:800}
        read-timeout-ms: ${INS_CLIENT_BUDGETING_READ_TIMEOUT_MS:1500}
