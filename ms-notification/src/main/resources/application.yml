# BASE / DEV (default)
server:
  port: 8086                   # porta do ms-notification
  servlet:
    context-path: /notification # base path do serviço
  shutdown: graceful            # encerra com segurança
  compression:
    enabled: true               # compressão HTTP
    mime-types: >
      text/html,text/xml,text/plain,text/css,
      text/javascript,application/javascript,
      application/json,application/xml
    min-response-size: 1024     # só comprime acima disso
  forward-headers-strategy: framework  # lê X-Forwarded-* (proxy/gateway)

spring:
  application:
    name: ms-notification       # nome do serviço

  main:
    allow-bean-definition-overriding: false
    keep-alive: true
    web-application-type: servlet
    threads:
      virtual:
        enabled: true           # threads virtuais (Java 21+/Boot 4)

  jackson:
    time-zone: UTC

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/ecofy_notification} # dev local
      auto-index-creation: false  # índices via migration/manual

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092} # dev local
    client-id: ms-notification
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}     # dev (prod usa SSL/SASL_SSL)

    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:${spring.application.name}}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      max-poll-records: ${KAFKA_MAX_POLL_RECORDS:10}
      properties:
        spring.json.use.type.headers: false
        spring.json.trusted.packages: ${KAFKA_TRUSTED_PACKAGES:br.com.ecofy.ms_notification.adapters.in.kafka.dto}

    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true   # evita duplicar publish

    listener:
      ack-mode: record             # commit por mensagem

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWKS_URI:http://localhost:8081/auth/.well-known/jwks.json} # dev local

ecofy:
  notification:
    topics:
      budget-alert: ${NTF_TOPIC_BUDGET_ALERT:eco.budget.alert}
      insight-created: ${NTF_TOPIC_INSIGHT_CREATED:eco.insight.created}
      notification-sent: ${NTF_TOPIC_NOTIFICATION_SENT:eco.notification.sent}

    idempotency:
      enabled: ${NTF_IDEMPOTENCY_ENABLED:true}
      ttl: ${NTF_IDEMPOTENCY_TTL:PT24H}

    retry:
      max-attempts: ${NTF_RETRY_MAX:3}
      base-backoff: ${NTF_RETRY_BACKOFF:PT3S}
      multiplier: ${NTF_RETRY_MULT:2.0}

    clients:
      user-profile:
        enabled: ${NTF_USER_PROFILE_CLIENT_ENABLED:false}
        base-url: ${NTF_USER_PROFILE_BASE_URL:http://localhost:8087/users} # dev
        connect-timeout-ms: ${NTF_USER_PROFILE_CONNECT_TIMEOUT_MS:800}
        read-timeout-ms: ${NTF_USER_PROFILE_READ_TIMEOUT_MS:1500}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    mongo:
      enabled: true
    kafka:
      enabled: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

logging:
  level:
    root: INFO
    br.com.ecofy.ms_notification: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.springframework.data.mongodb.core.MongoTemplate: INFO
    org.springframework.kafka: INFO


# PROFILE: test
---
spring:
  config:
    activate:
      on-profile: test

  data:
    mongodb:
      uri: ${MONGO_URI_TEST:mongodb://localhost:27018/ecofy_notification_test}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS_TEST:localhost:19092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID_TEST:ms-notification-test}

logging:
  level:
    root: WARN
    br.com.ecofy.ms_notification: INFO

ecofy:
  notification:
    idempotency:
      ttl: PT1M


# PROFILE: prod
---
spring:
  config:
    activate:
      on-profile: prod

  data:
    mongodb:
      uri: ${MONGO_URI}          # sem default local

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}            # sem default local
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL} # default seguro

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWKS_URI}                       # obrigatório

logging:
  level:
    root: INFO
    br.com.ecofy.ms_notification: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.springframework.kafka: INFO
