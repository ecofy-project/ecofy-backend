server:
  port: 8086
  servlet:
    context-path: /notification
  shutdown: graceful
  compression:
    enabled: true
    mime-types: >
      text/html,text/xml,text/plain,text/css,
      text/javascript,application/javascript,
      application/json,application/xml
    min-response-size: 1024
  # Confia nos cabeçalhos X-Forwarded-* enviados pelo gateway.
  forward-headers-strategy: framework

spring:
  application:
    name: ms-notification

  main:
    allow-bean-definition-overriding: false
    keep-alive: true
    web-application-type: servlet
    threads:
      # Habilita threads virtuais para as requisições HTTP.
      virtual:
        enabled: true

  jackson:
    time-zone: UTC

  data:
    # Aponta para o banco local de desenvolvimento.
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/ecofy_notification}
      # Cria os índices por migration, e não na inicialização da aplicação.
      auto-index-creation: false

  kafka:
    # Aponta para o broker local de desenvolvimento.
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    client-id: ms-notification
    properties:
      # Usa conexão sem criptografia em desenvolvimento; produção sobrescreve o protocolo.
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}

    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:${spring.application.name}}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      max-poll-records: ${KAFKA_MAX_POLL_RECORDS:10}
      properties:
        spring.json.use.type.headers: false
        spring.json.trusted.packages: ${KAFKA_TRUSTED_PACKAGES:br.com.ecofy.ms_notification.adapters.in.kafka.dto}

    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Evita duplicar mensagens em caso de reenvio do producer.
        enable.idempotence: true

    listener:
      # Confirma o offset por mensagem processada.
      ack-mode: record

  security:
    oauth2:
      resourceserver:
        jwt:
          # Aponta para o JWKS local do ms-auth.
          jwk-set-uri: ${JWT_JWKS_URI:http://localhost:8081/auth/.well-known/jwks.json}

ecofy:
  notification:
    # Libera a API em desenvolvimento e testes; produção e sandbox exigem JWT.
    security:
      permit-all: ${NTF_SECURITY_PERMIT_ALL:true}

    topics:
      budget-alert: ${NTF_TOPIC_BUDGET_ALERT:eco.budget.alert}
      insight-created: ${NTF_TOPIC_INSIGHT_CREATED:eco.insight.created}
      notification-sent: ${NTF_TOPIC_NOTIFICATION_SENT:eco.notification.sent}

    idempotency:
      enabled: ${NTF_IDEMPOTENCY_ENABLED:true}
      ttl: ${NTF_IDEMPOTENCY_TTL:PT24H}

    # Define a política de retry de entrega, com teto de backoff entre tentativas.
    retry:
      max-attempts: ${NTF_RETRY_MAX:3}
      base-backoff: ${NTF_RETRY_BACKOFF:PT3S}
      multiplier: ${NTF_RETRY_MULT:2.0}
      max-backoff: ${NTF_RETRY_MAX_BACKOFF:PT5M}

    # Liga o publisher da Outbox de eventos de entrega.
    scheduling:
      enabled: ${NTF_SCHEDULING_ENABLED:true}

    # Configura a Transactional Outbox de eventos de entrega.
    outbox:
      poll-interval-ms: ${NTF_OUTBOX_POLL_INTERVAL_MS:1000}

    # Mantém os providers externos desligados por padrão, já que desenvolvimento usa console.
    # Habilite-os explicitamente e informe base-url e api-key por ambiente, nunca no repositório.
    providers:
      email:
        enabled: ${ECOFY_NOTIFICATION_EMAIL_ENABLED:false}
        base-url: ${ECOFY_NOTIFICATION_EMAIL_BASE_URL:}
        api-key: ${ECOFY_NOTIFICATION_EMAIL_API_KEY:}
        sender: ${ECOFY_NOTIFICATION_EMAIL_SENDER:}
        connect-timeout: ${ECOFY_NOTIFICATION_EMAIL_CONNECT_TIMEOUT:3s}
        read-timeout: ${ECOFY_NOTIFICATION_EMAIL_READ_TIMEOUT:10s}
      push:
        enabled: ${ECOFY_NOTIFICATION_PUSH_ENABLED:false}
        base-url: ${ECOFY_NOTIFICATION_PUSH_BASE_URL:}
        api-key: ${ECOFY_NOTIFICATION_PUSH_API_KEY:}
        connect-timeout: ${ECOFY_NOTIFICATION_PUSH_CONNECT_TIMEOUT:3s}
        read-timeout: ${ECOFY_NOTIFICATION_PUSH_READ_TIMEOUT:10s}
      whatsapp:
        enabled: ${ECOFY_NOTIFICATION_WHATSAPP_ENABLED:false}
        base-url: ${ECOFY_NOTIFICATION_WHATSAPP_BASE_URL:}
        api-key: ${ECOFY_NOTIFICATION_WHATSAPP_API_KEY:}
        connect-timeout: ${ECOFY_NOTIFICATION_WHATSAPP_CONNECT_TIMEOUT:3s}
        read-timeout: ${ECOFY_NOTIFICATION_WHATSAPP_READ_TIMEOUT:10s}

    # Protege os providers externos com circuit breaker.
    circuit-breaker:
      failure-threshold: ${ECOFY_NOTIFICATION_CB_FAILURE_THRESHOLD:5}
      wait-duration-open-state: ${ECOFY_NOTIFICATION_CB_WAIT:30s}

    clients:
      # Aponta para o ms-users local e autentica com token de serviço, nunca com JWT de usuário.
      user-profile:
        enabled: ${NTF_USER_PROFILE_CLIENT_ENABLED:false}
        base-url: ${ECOFY_USERS_INTERNAL_URL:${NTF_USER_PROFILE_BASE_URL:http://localhost:8087/users}}
        connect-timeout-ms: ${NTF_USER_PROFILE_CONNECT_TIMEOUT_MS:800}
        read-timeout-ms: ${NTF_USER_PROFILE_READ_TIMEOUT_MS:1500}
        service-token: ${ECOFY_INTERNAL_SERVICE_TOKEN:}

# Expõe os endpoints necessários para saúde e métricas.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    mongo:
      enabled: true
    kafka:
      enabled: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

logging:
  level:
    root: INFO
    br.com.ecofy.ms_notification: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.springframework.data.mongodb.core.MongoTemplate: INFO
    org.springframework.kafka: INFO
