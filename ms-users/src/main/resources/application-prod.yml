# Configura o ambiente de produção.
spring:
  # Exige as credenciais do banco por variável de ambiente, sem default local.
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      pool-name: MsUsersHikariPool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    # Mantém a baseline automática desligada por padrão em produção.
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}
    default-schema: ${DB_SCHEMA:ecofy_users}
    locations: classpath:db/migration

  kafka:
    # Exige o endereço do broker por variável de ambiente, sem default local.
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      # Adota conexão autenticada e criptografada como padrão.
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}

  security:
    oauth2:
      resourceserver:
        jwt:
          # Exige o endereço do JWKS por variável de ambiente.
          jwk-set-uri: ${JWT_JWKS_URI}

# Reduz o nível dos logs em produção.
logging:
  level:
    root: INFO
    br.com.ecofy.ms_users: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

ecofy:
  users:
    # Exige autenticação em todas as rotas protegidas.
    security:
      permit-all: false
    topics:
      auth-user-created: ${USR_TOPIC_AUTH_USER_CREATED:auth.user.registered}
      eco-user-event: ${USR_TOPIC_ECO_USER_EVENT:eco.user.event}
    idempotency:
      ttl: ${USR_IDEMPOTENCY_TTL:PT24H}
    # Limita o tamanho das páginas, com max-size como teto obrigatório.
    pagination:
      default-size: ${USR_DEFAULT_PAGE_SIZE:20}
      max-size: ${USR_MAX_PAGE_SIZE:100}
    external-auth:
      base-url: ${AUTH_MS_BASE_URL:https://auth.ecofy.com}
      connect-timeout: ${AUTH_MS_CONNECT_TIMEOUT:2s}
      read-timeout: ${AUTH_MS_READ_TIMEOUT:3s}
