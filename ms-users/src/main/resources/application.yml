server:
  port: 8087
  servlet:
    context-path: /users
  shutdown: graceful
  compression:
    enabled: true
    mime-types: >
      text/html,text/xml,text/plain,text/css,
      text/javascript,application/javascript,
      application/json,application/xml
    min-response-size: 1024
  # Confia nos cabeçalhos X-Forwarded-* enviados pelo gateway.
  forward-headers-strategy: framework

spring:
  application:
    name: ms-users

  main:
    allow-bean-definition-overriding: false
    keep-alive: true
    web-application-type: servlet
    threads:
      # Habilita threads virtuais para as requisições HTTP.
      virtual:
        enabled: true

  jackson:
    time-zone: UTC

  sql:
    init:
      mode: never

  # Aponta para o banco local de desenvolvimento.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5438/ecofy_users}
    username: ${DB_USER:ecofy_users}
    password: ${DB_PASS:ecofy_users}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: MsUsersHikariPool
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      # Desliga a detecção de vazamento de conexão.
      leak-detection-threshold: 0

  jpa:
    open-in-view: false
    hibernate:
      # Valida o schema em vez de criá-lo, já que as tabelas vêm do Flyway.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    # Cria a baseline automaticamente; evite manter isso ligado em produção.
    baseline-on-migrate: true
    default-schema: ${DB_SCHEMA:ecofy_users}
    locations: classpath:db/migration

  kafka:
    # Aponta para o broker local de desenvolvimento.
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    client-id: ms-users
    properties:
      # Usa conexão sem criptografia em desenvolvimento; produção sobrescreve o protocolo.
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}

    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:${spring.application.name}}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Mantém a desserialização JSON no código, e não nesta configuração.
      auto-offset-reset: earliest
      max-poll-records: ${KAFKA_MAX_POLL_RECORDS:10}

    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Evita duplicar mensagens em caso de reenvio do producer.
        enable.idempotence: true

    listener:
      # Confirma o offset por mensagem processada.
      ack-mode: record

  security:
    oauth2:
      resourceserver:
        jwt:
          # Aponta para o JWKS local do ms-auth.
          jwk-set-uri: ${JWT_JWKS_URI:http://localhost:8081/auth/.well-known/jwks.json}

ecofy:
  users:
    security:
      # Exige autenticação por padrão: sem JWT não há identidade e a verificação de
      # proprietário deixa de ser aplicada. Ligue apenas para diagnóstico pontual.
      permit-all: ${USR_SECURITY_PERMIT_ALL:false}
    topics:
      auth-user-created: ${USR_TOPIC_AUTH_USER_CREATED:auth.user.registered}
      eco-user-event: ${USR_TOPIC_ECO_USER_EVENT:eco.user.event}
    idempotency:
      ttl: ${USR_IDEMPOTENCY_TTL:PT24H}
    # Limita o tamanho das páginas, com max-size como teto obrigatório.
    pagination:
      default-size: ${USR_DEFAULT_PAGE_SIZE:20}
      max-size: ${USR_MAX_PAGE_SIZE:100}
    # Aponta para o ms-auth local de desenvolvimento.
    external-auth:
      base-url: ${AUTH_MS_BASE_URL:http://localhost:8081/auth}
      connect-timeout: ${AUTH_MS_CONNECT_TIMEOUT:2s}
      read-timeout: ${AUTH_MS_READ_TIMEOUT:3s}
    internal:
      enabled: true
      token: ${INTERNAL_TOKEN:local-internal-token}

# Expõe os endpoints necessários para saúde e métricas.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true
    kafka:
      enabled: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

logging:
  # Inclui o correlation ID no padrão dos logs.
  pattern:
    level: "%5p [correlationId=%X{correlationId:-}]"
  level:
    root: INFO
    br.com.ecofy.ms_users: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
