# BASE / DEV (default)
server:
  port: 8087                # porta do ms-users
  servlet:
    context-path: /users     # base path do serviço
  shutdown: graceful         # encerra com segurança
  compression:
    enabled: true            # compressão HTTP
    mime-types: >
      text/html,text/xml,text/plain,text/css,
      text/javascript,application/javascript,
      application/json,application/xml
    min-response-size: 1024  # só comprime acima disso
  forward-headers-strategy: framework  # lê X-Forwarded-* (proxy/gateway)

spring:
  application:
    name: ms-users           # nome do serviço

  main:
    allow-bean-definition-overriding: false
    keep-alive: true
    web-application-type: servlet
    threads:
      virtual:
        enabled: true        # threads virtuais (Java 21+/Boot 4)

  jackson:
    time-zone: UTC

  sql:
    init:
      mode: never

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5438/ecofy_users} # dev local
    username: ${DB_USER:ecofy_users}
    password: ${DB_PASS:ecofy_users}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: MsUsersHikariPool
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 0  # 0 desliga

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate      # não cria tabelas (usa Flyway)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true # baseline automático (evite em prod)
    default-schema: ${DB_SCHEMA:ecofy_users}
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092} # dev local
    client-id: ms-users
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}     # dev (prod usa SSL/SASL_SSL)

    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:${spring.application.name}}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # não configure JsonDeserializer via YAML aqui
      auto-offset-reset: earliest
      max-poll-records: ${KAFKA_MAX_POLL_RECORDS:10}

    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true  # evita duplicar publish

    listener:
      ack-mode: record            # commit por mensagem

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWKS_URI:http://localhost:8081/.well-known/jwks.json} # dev local

ecofy:
  users:
    security:
      permit-all: ${USR_SECURITY_PERMIT_ALL:true} # dev default: true
    topics:
      auth-user-created: ${USR_TOPIC_AUTH_USER_CREATED:auth.user.created}
      eco-user-event: ${USR_TOPIC_ECO_USER_EVENT:eco.user.event}
    idempotency:
      ttl: ${USR_IDEMPOTENCY_TTL:PT24H}
    external-auth:
      base-url: ${AUTH_MS_BASE_URL:http://localhost:8081/auth} # dev
      connect-timeout: ${AUTH_MS_CONNECT_TIMEOUT:2s}
      read-timeout: ${AUTH_MS_READ_TIMEOUT:3s}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true
    kafka:
      enabled: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

logging:
  level:
    root: INFO
    br.com.ecofy.ms_users: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE


# PROFILE: test
---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: ${DB_URL_TEST:jdbc:postgresql://localhost:5438/ecofy_users_test}
    username: ${DB_USER_TEST:ecofy_users_test}
    password: ${DB_PASS_TEST:}    # sem default fraco

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop        # cria e apaga no fim
    show-sql: false

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS_TEST:localhost:19092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID_TEST:ms-users-test}

logging:
  level:
    root: WARN
    br.com.ecofy.ms_users: INFO

ecofy:
  users:
    security:
      permit-all: true
    idempotency:
      ttl: PT1M


# PROFILE: prod
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}                # sem default local
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      pool-name: MsUsersHikariPool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false} # default false
    default-schema: ${DB_SCHEMA:ecofy_users}
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}            # sem default local
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL} # default seguro

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWKS_URI}                       # obrigatório

logging:
  level:
    root: INFO
    br.com.ecofy.ms_users: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

ecofy:
  users:
    security:
      permit-all: false
    topics:
      auth-user-created: ${USR_TOPIC_AUTH_USER_CREATED:auth.user.created}
      eco-user-event: ${USR_TOPIC_ECO_USER_EVENT:eco.user.event}
    idempotency:
      ttl: ${USR_IDEMPOTENCY_TTL:PT24H}
    external-auth:
      base-url: ${AUTH_MS_BASE_URL:https://auth.ecofy.com}
      connect-timeout: ${AUTH_MS_CONNECT_TIMEOUT:2s}
      read-timeout: ${AUTH_MS_READ_TIMEOUT:3s}
